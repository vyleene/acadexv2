<!doctype html>
<html lang="en" data-bs-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      ;(() => {
        const storedTheme = localStorage.getItem('acadex-theme')
        const systemTheme = window.matchMedia('(prefers-color-scheme: dark)').matches
          ? 'dark'
          : 'light'
        const resolvedTheme = storedTheme === 'light' || storedTheme === 'dark'
          ? storedTheme
          : systemTheme

        document.documentElement.setAttribute('data-bs-theme', resolvedTheme)
        document.documentElement.style.colorScheme = resolvedTheme
      })()
    </script>
    <title>Acadex v2 - Simple Student Information System</title>
  </head>

  <body>
    <div id="splash-screen" aria-hidden="true">
      <div class="loading-screen__content">
        <div class="loading-screen__icon" aria-hidden="true"></div>
        <div class="loading-screen__title">Acadex</div>
        <div class="loading-screen__bar" aria-hidden="true">
          <span class="loading-screen__bar-fill"></span>
        </div>
        <div class="loading-screen__status" id="loading-status" role="status" aria-live="polite"></div>
      </div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
